name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  

jobs:
  build:
    runs-on:
      - self-hosted
      - Linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Runner
        run: |
          echo "Hostname:"
          hostname

          echo "Current User:"
          whoami

          echo "Current Directory:"
          pwd

          echo "Installed .NET Version:"
          dotnet --info

      - name: Restore Dependencies
        run: |
          dotnet restore MyDotNetApp.csproj

      - name: Build Application
        run: |
          dotnet build MyDotNetApp.csproj \
            --configuration Release \
            --no-restore

      - name: Install dotnet-format
        run: |
          dotnet tool install -g dotnet-format || dotnet tool update -g dotnet-format
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Lint
        run: |
          dotnet format MyDotNetApp.csproj --verify-no-changes

      - name: Run Unit Tests
        run: |
          dotnet test MyDotNetApp.Tests/MyDotNetApp.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test_results.trx"

      - name: Publish Unit Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Unit Test Results
          path: "**/*.trx"
          reporter: dotnet-trx