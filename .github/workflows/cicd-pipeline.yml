name: .NET CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on:
      - self-hosted
      - Linux

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Verify Runner
        run: |
          hostname
          whoami
          pwd
          dotnet --info

      - name: Restore Dependencies
        run: dotnet restore MyDotNetApp.csproj

      - name: Build Application
        run: dotnet build MyDotNetApp.csproj --configuration Release --no-restore

      - name: Lint Check
        run: dotnet format MyDotNetApp.csproj --verify-no-changes

      - name: Run Unit Tests
        run: dotnet test MyDotNetApp.Tests/MyDotNetApp.Tests.csproj --logger trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: "**/*.trx"